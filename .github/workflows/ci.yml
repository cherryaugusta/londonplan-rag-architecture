name: CI

on:
  push:
  pull_request:

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: londonplan
          POSTGRES_USER: londonplan
          POSTGRES_PASSWORD: londonplan_dev_password
        ports:
          - 55432:5432
        options: >-
          --health-cmd="pg_isready -U londonplan -d londonplan"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/londonplan-client/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install backend dependencies
        working-directory: api
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements-dev.txt

      - name: Install frontend dependencies
        working-directory: client/londonplan-client
        run: npm ci

      - name: Tree check
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $Root = Get-Location

          $Expected = @(
            ".editorconfig",
            ".gitattributes",
            ".gitignore",
            ".pre-commit-config.yaml",
            "docker-compose.yml",
            "Dockerfile",
            "README.md",
            ".github/workflows/ci.yml",
            "ai_governance/prompt_catalog.json",
            "ai_governance/evaluation_sample.json",
            "api/manage.py",
            "api/requirements.txt",
            "api/requirements-dev.txt",
            "api/pyproject.toml",
            "api/.env.example",
            "api/pytest.ini",
            "api/londonplan_api/settings.py",
            "api/londonplan_api/urls.py",
            "api/core/middleware.py",
            "api/core/serializers.py",
            "api/core/views.py",
            "api/core/urls.py",
            "api/core/tests/test_health.py",
            "client/londonplan-client/.env.example",
            "client/londonplan-client/proxy.conf.json",
            "client/londonplan-client/openapi-generator-config.json",
            "client/londonplan-client/src/app/api/api-contract.ts",
            "client/londonplan-client/src/app/api/health.service.ts",
            "client/londonplan-client/src/app/features/health-check/health-check.ts",
            "client/londonplan-client/src/app/features/health-check/health-check.html",
            "client/londonplan-client/src/app/features/health-check/health-check.scss",
            "client/londonplan-client/src/app/generated-api/generated-health.service.ts",
            "client/londonplan-client/src/app/generated-api/index.ts",
            "docs/adr/0001-security-by-design.md",
            "docs/adr/0002-openapi-contract-first.md",
            "docs/adr/0003-generated-angular-client.md",
            "docs/adr/0004-ai-governance-and-human-review.md",
            "docs/api/openapi.yaml",
            "infra/postgres-init.sql",
            "scripts/gates.ps1",
            "scripts/audit-python.ps1",
            "scripts/tree-check.ps1",
            "scripts/export-openapi.ps1",
            "scripts/check-openapi-lock.ps1"
          )

          $Missing = @()
          foreach ($p in $Expected) {
            if (!(Test-Path (Join-Path $Root $p))) { $Missing += $p }
          }

          if ($Missing.Count -gt 0) {
            Write-Host "== MISSING FILES ==" -ForegroundColor Red
            $Missing | ForEach-Object { Write-Host " - $_" -ForegroundColor Red }
            exit 1
          }

          Write-Host "== Structure OK ==" -ForegroundColor Green

      - name: Run backend tests
        working-directory: api
        env:
          DJANGO_DEBUG: "1"
          DJANGO_SECRET_KEY: "INSECURE_DEV_ONLY_CHANGE_ME"
          DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
          DB_NAME: londonplan
          DB_USER: londonplan
          DB_PASSWORD: londonplan_dev_password
          DB_HOST: 127.0.0.1
          DB_PORT: "55432"
          REDIS_URL: redis://localhost:6379/0
          CORS_ALLOWED_ORIGINS: http://localhost:4200,http://127.0.0.1:4200
        run: |
          . .venv/bin/activate
          pytest
          python manage.py check

      - name: Export OpenAPI schema
        working-directory: api
        env:
          DJANGO_DEBUG: "1"
          DJANGO_SECRET_KEY: "INSECURE_DEV_ONLY_CHANGE_ME"
          DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
          DB_NAME: londonplan
          DB_USER: londonplan
          DB_PASSWORD: londonplan_dev_password
          DB_HOST: 127.0.0.1
          DB_PORT: "55432"
          REDIS_URL: redis://localhost:6379/0
          CORS_ALLOWED_ORIGINS: http://localhost:4200,http://127.0.0.1:4200
        run: |
          . .venv/bin/activate
          python manage.py spectacular --file ../docs/api/openapi.yaml

      - name: Verify OpenAPI lock file exists
        run: test -f docs/api/openapi.yaml

      - name: Generate Angular API client
        working-directory: client/londonplan-client
        run: npm run generate:api

      - name: Build Angular app
        working-directory: client/londonplan-client
        run: npm run build

      - name: Run dependency audit
        working-directory: api
        run: |
          . .venv/bin/activate
          pip-audit -r requirements.txt
          safety check -r requirements.txt
